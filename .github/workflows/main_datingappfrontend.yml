name: Build and deploy Node.js app to Azure Web App - datingappfrontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: npm install and build
        run: |
          cd client
          npm install --legacy-peer-deps
          # This generates the 'dist' folder inside the 'client' directory
          npm run build --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # Update this path to your actual build output folder. 
          # Usually client/dist/ or client/dist/<your-app-name>
          path: client/dist/
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./release

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_79E40E86BB6B4B98AC25BB69EBBDECE6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E0C3D57F00C24D89BA60B6B797F2DDBD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9763EC9935F9451588B58C5CEEFBD23F }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'datingappfrontend'
          slot-name: 'Production'
          # Deploys only the compiled production files
          package: ./release
